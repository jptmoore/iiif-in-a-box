# IIIF-in-a-Box Project Configuration
# This file defines project-specific settings, metadata, and IIIF manifest properties
# 
# IMPORTANT: This file must contain exactly ONE project (plus defaults and _template)
# 
# USAGE: ./bootstrap.sh build
# 
# The system will automatically use the single project defined below

# Default settings that apply to all projects unless overridden
defaults:
  # File locations (relative to project root)
  images_dir: "web/images"
  annotations_dir: "web/annotations"
  manifests_dir: "web/iiif"
  pages_dir: "web/pages"
  
  # Service URLs
  base_url: "http://localhost:8080"
  viewer_url: "/viewer/"
  
  # Default provider information
  provider:
    id: "https://nationalarchives.gov.uk"
    type: "Agent"
    label:
      en:
        - "The National Archives"
        - "Bessant Drive, Richmond"
        - "TW9 4DU UK"
        - "T +44 (0)20 8876 3444"
        - "E research@nationalarchives.gov.uk"
        - "https://nationalarchives.gov.uk"
    homepage:
      - id: "https://nationalarchives.gov.uk"
        type: "Text"
        label:
          en: ["Explore our collections"]
        format: "text/html"

# Project-specific configurations
# Must contain exactly ONE project
projects:
  
  # Your project configuration
  domesday:
    title: "Domesday"
    description: "Explore Domesday using our interactive IIIF viewer"
    
    metadata:
      - label:
          en: ["Publication/creation"]
        value:
          none: ["Medieval 1086"]
      - label:
          en: ["Contributors"]
        value:
          none: ["Hull Domesday Project, David Roffe"]
      - label:
          en: ["Copyright note"]
        value:
          en: ["Crown Copyright."]
      - label:
          en: ["Type/technique"]
        value:
          en: ["Manuscript record"]
      - label:
          en: ["Subjects"]
        value:
          en: ["Domesday", "Great Britain", "Medieval England"]
      - label:
          en: ["Attribution and usage"]
        value:
          en:
            - "The National Archives"
            - "<span>You have permission to make copies of this work under a <a target=\"_top\" href=\"http://creativecommons.org/licenses/by-nc/4.0/\">Creative Commons, Attribution, Non-commercial license</a>.<br/><br/>Non-commercial use includes private study, academic research, teaching, and other activities that are not primarily intended for, or directed towards, commercial advantage or private monetary compensation. See the <a target=\"_top\" href=\"http://creativecommons.org/licenses/by-nc/4.0/legalcode\">Legal Code</a> for further information.<br/><br/>Image source should be attributed as specified in the full catalogue record. If no source is given the image should be attributed to The National Archives.</span>"


