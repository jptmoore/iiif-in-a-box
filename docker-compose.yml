# IIIF-In-A-Box Docker Compose Configuration
#
# This configuration defines the services for a complete IIIF server stack, including:
# - iipimage: IIIF Image API server
# - quickwit: Search backend for annotations
# - annosearch: API for searching annotations
# - miiify: IIIF Annotation server
# - tamerlane: IIIF viewer
# - nginx: Reverse proxy and static file server

x-common: &common
  restart: unless-stopped
  security_opt:
    - no-new-privileges:true

services:
  # IIPImage IIIF Image API server
  iipimage:
    <<: *common
    container_name: iiif-iipimage
    image: iipsrv/iipsrv:latest
    platform: linux/amd64  # Required for Apple Silicon Macs (ARM64)
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      - ${OUTPUT_DIR}/web/images:/images:ro
    environment:
      - FILESYSTEM_PREFIX=/images/
      - MAX_IMAGE_CACHE_SIZE=1000
      - JPEG_QUALITY=90
      - MAX_CVT=5000
      - ALLOW_UPSCALING=0  # prevent requests for images larger than originals
    networks:
      - iiif-network
    expose:
      - "9000"
    deploy:
      resources:
        limits:
          memory: 1g

  # Quickwit search backend
  quickwit:
    <<: *common
    container_name: iiif-quickwit
    image: quickwit/quickwit
    command: run
    ports:
      - "127.0.0.1:7280:7280"
    volumes:
      - ${OUTPUT_DIR}/annosearch/qwdata:/quickwit/qwdata
    networks:
      - iiif-network
    # No in-container healthcheck — see comment on annosearch above.
    deploy:
      resources:
        limits:
          memory: 1g

  # AnnoSearch API
  annosearch:
    <<: *common
    container_name: iiif-annosearch
    image: ghcr.io/nationalarchives/annosearch:latest
    platform: linux/amd64  # Only AMD64 available on ghcr.io
    command: ["serve"]  # ENTRYPOINT already set to: node ./dist/index.js
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - quickwit
    environment:
      ANNOSEARCH_PUBLIC_URL: ${ANNOSEARCH_PUBLIC_URL:-http://localhost:8080/annosearch}
      QUICKWIT_BASE_URL: ${QUICKWIT_BASE_URL:-http://quickwit:7280/api/v1/}
      NODE_OPTIONS: "--no-warnings"  # suppress MaxListenersExceededWarning from concurrent Quickwit connections
    extra_hosts:
      # The manifest may reference canvas/image URLs at http://localhost:8080/...
      # (your --hostname). Map "localhost" inside the container to the Docker host
      # so AnnoSearch can dereference those URLs during indexing.
      localhost: host-gateway
    networks:
      - iiif-network
    # No in-container healthcheck. Readiness is enforced uniformly by
    # bootstrap.sh probing every service's HTTP endpoint from inside the
    # iiif-nginx container after `docker compose up`.
    deploy:
      resources:
        limits:
          memory: 512m

  # Miiify v2 annotation server
  miiify:
    <<: *common
    container_name: iiif-miiify
    image: ghcr.io/nationalarchives/miiify:latest
    platform: linux/amd64  # Only AMD64 available on ghcr.io
    command:
      - "/home/miiify/miiify-serve"
      - "--repository"
      - "./pack_store"
      - "--port"
      - "10000"
      - "--base-url"
      - "${MIIIFY_BASE_URL:-http://localhost:8080/miiify}"
    ports:
      - "127.0.0.1:10000:10000"
    volumes:
      - ${OUTPUT_DIR}/miiify/pack_store:/home/miiify/pack_store:rw
    networks:
      - iiif-network
    # No in-container healthcheck — see comment on annosearch above.
    deploy:
      resources:
        limits:
          memory: 512m

  # Tamerlane IIIF Viewer
  # Note: ghcr.io/tamerlaneviewer/tamerlane currently only available as ARM64
  # May require authentication: docker login ghcr.io
  tamerlane:
    <<: *common
    container_name: iiif-tamerlane
    image: ghcr.io/tamerlaneviewer/tamerlane:latest
    pull_policy: if_not_present
    ports:
      - "127.0.0.1:3001:3001"
    networks:
      - iiif-network
    deploy:
      resources:
        limits:
          memory: 256m

  # Nginx reverse proxy and static file server
  nginx:
    <<: *common
    container_name: iiif-nginx
    image: nginx:alpine
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - ./nginx/conf/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ${OUTPUT_DIR}/web:/var/www/html:ro
    depends_on:
      - iipimage
      - miiify
      - annosearch
      - tamerlane
    networks:
      - iiif-network
    # Note: no healthcheck. The bootstrap script's wait_for_annosearch step
    # probes annosearch through this nginx (`docker exec iiif-nginx wget ...`),
    # which implicitly verifies nginx is serving traffic.
    deploy:
      resources:
        limits:
          memory: 256m

networks:
  iiif-network:
    external: true
