# Rate limit zones — share a 10MB shared memory zone keyed by client IP.
# 10MB ~ 160k unique IPs.
#
# This is a read-only deployment: there is no write or ingest path. Limits are
# sized to protect against scraping/DoS while comfortably serving real viewers,
# which can fetch 30–60 image tiles per second during rapid pan/zoom.
# Bursts queue (no `nodelay`) so transient spikes complete instead of 429ing.
limit_req_zone $binary_remote_addr zone=iiif_image:10m rate=60r/s;
limit_req_zone $binary_remote_addr zone=iiif_api:10m rate=30r/s;
limit_req_status 429;

server {
    listen 80;
    
    # Security headers (appropriate for public deployment)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # Hide nginx version
    server_tokens off;
    
    # Real IP from AWS Load Balancer
    real_ip_header X-Forwarded-For;
    set_real_ip_from 10.0.0.0/8;    # AWS VPC range
    set_real_ip_from 172.16.0.0/12; # AWS VPC range
    set_real_ip_from 192.168.0.0/16; # AWS VPC range
    real_ip_recursive on;

    # Route specific services to their containers
    location /annosearch/ {
        # Only allow GET and HEAD methods for search
        limit_except GET HEAD {
            deny all;
        }
        limit_req zone=iiif_api burst=100;
        proxy_pass http://annosearch:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    location /miiify/ {
        # Only allow GET and HEAD methods for annotation server
        limit_except GET HEAD {
            deny all;
        }
        limit_req zone=iiif_api burst=100;
        proxy_pass http://miiify:10000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # Route /viewer to Tamerlane IIIF viewer
    location /viewer/ {
        proxy_pass http://tamerlane:3001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # Route /annotations to miiify backend (for IIIF annotation endpoints)
    location /annotations/ {
        # Only allow GET and HEAD methods for annotations
        limit_except GET HEAD {
            deny all;
        }
        limit_req zone=iiif_api burst=100;
        proxy_pass http://miiify:10000/annotations/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # Serve IIIF manifest JSON files as static content (only top-level .json files, not IIIF Image API info.json)
    location ~ ^/iiif/[^/]+\.json$ {
        root /var/www/html;
        add_header Content-Type application/json;
        add_header Access-Control-Allow-Origin *;
        add_header Cache-Control "public, max-age=300";
        # Re-state security headers: child add_header blocks do not inherit the server block's
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        try_files $uri =404;
    }

    # Block path traversal attempts in IIIF image requests
    location ~ ^/iiif/.*\.\.  {
        return 400;
    }

    # Route IIIF Image API requests to IIPImage server (FastCGI)
    # Extracts everything after /iiif/ and passes to IIPImage as IIIF parameter
    location ~ ^/iiif/(.+)$ {
        # Only allow GET and HEAD methods for image API
        limit_except GET HEAD {
            deny all;
        }
        limit_req zone=iiif_image burst=500;
        
        # Image tiles are immutable for a given URL — cache aggressively
        add_header Cache-Control "public, max-age=86400";
        
        # FastCGI configuration for IIPImage server
        fastcgi_pass iipimage:9000;
        fastcgi_param PATH_INFO $fastcgi_script_name;
        fastcgi_param REQUEST_METHOD $request_method;
        fastcgi_param QUERY_STRING "IIIF=$1";
        fastcgi_param CONTENT_TYPE $content_type;
        fastcgi_param CONTENT_LENGTH $content_length;
        fastcgi_param SERVER_PROTOCOL $server_protocol;
        fastcgi_param REQUEST_URI $request_uri;
        fastcgi_param HTTPS $https if_not_empty;
        
        # Add timeout settings
        fastcgi_connect_timeout 10s;
        fastcgi_send_timeout 10s;
        fastcgi_read_timeout 30s;
    }

    # Health check endpoint for ALB
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Serve static files directly from /var/www/html
    location / {
        root /var/www/html;
        index index.html;
        try_files $uri $uri/ =404;
        
        # Only allow GET and HEAD methods for main web content
        limit_except GET HEAD {
            deny all;
        }
    }
}
