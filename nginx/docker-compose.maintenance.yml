services:
  nginx:
    container_name: iiif-nginx-maintenance
    image: nginx:alpine
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - ./conf/maintenance.conf:/etc/nginx/conf.d/default.conf:ro
      - ../templates/maintenance.html:/usr/share/nginx/html/index.html:ro
    networks:
      - iiif-network

networks:
  iiif-network:
    external: true
