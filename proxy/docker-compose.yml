services:
  web:
    container_name: iiif-web
    build: 
      context: ../../
      dockerfile: iiif-in-a-box/web/Dockerfile
    networks:
      - appnet

  quickwit:
    container_name: iiif-quickwit
    image: quickwit/quickwit
    command: run
    ports:
      - "127.0.0.1:7280:7280"
    volumes:
      - ../../annosearch/qwdata:/quickwit/qwdata
    networks:
      - appnet

  annosearch:
    container_name: iiif-annosearch
    build: ../../annosearch
    entrypoint: ["node", "./dist/index.js"]
    command: ["serve"]
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - quickwit
    environment:
      ANNOSEARCH_PUBLIC_URL: http://localhost:8080/annosearch
      QUICKWIT_BASE_URL: http://quickwit:7280/api/v1/
    networks:
      - appnet

  cantaloupe:
    container_name: iiif-cantaloupe
    build: ../../iiif-in-a-box/cantaloupe
    image: cantaloupe:5.0.7
    volumes:
      - ../../iiif-in-a-box/web/images:/images
    networks:
      - appnet
    command: >
      java
      -Dcantaloupe.config=cantaloupe.properties
      -Xmx2g
      -jar cantaloupe-5.0.7.jar

  nginx:
    container_name: iiif-nginx
    image: nginx:alpine
    ports:
      - "8080:80"
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      web:
        condition: service_started
      annosearch:
        condition: service_started
      miiify:
        condition: service_started
    networks:
      - appnet

  miiify:
    container_name: iiif-miiify
    build: ../miiify
    ports:
      - "127.0.0.1:10000:10000"
    volumes:
      - miiify_db:/home/miiify/db
    networks:
      - appnet
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:10000/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

networks:
  appnet:
    driver: bridge

volumes:
  miiify_db:
  quickwit_data:

