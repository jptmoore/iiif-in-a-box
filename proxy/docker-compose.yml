services:
  web:
    build: 
      context: ../../
      dockerfile: dd/web/Dockerfile
    networks:
      - appnet

  quickwit:
    image: quickwit/quickwit
    command: run
    ports:
      - "127.0.0.1:7280:7280"
    volumes:
      - ../../annosearch/qwdata:/quickwit/qwdata
    networks:
      - appnet

  annosearch:
    build: ../../annosearch
    entrypoint: ["node", "./dist/index.js"]
    command: ["serve"]
    depends_on:
      - quickwit
    environment:
      ANNOSEARCH_PUBLIC_URL: http://localhost:8080/annosearch
      QUICKWIT_BASE_URL: http://quickwit:7280/api/v1/
    networks:
      - appnet

  cantaloupe:
    build: ../cantaloupe
    volumes:
      - ../web/images:/images
    networks:
      - appnet

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      web:
        condition: service_started
      annosearch:
        condition: service_started
      cantaloupe:
        condition: service_started
      miiify:
        condition: service_started
    networks:
      - appnet

  miiify:
    build: ../miiify
    ports:
      - "127.0.0.1:10000:10000"
    volumes:
      - ../../miiify/miiify/db:/home/miiify/db
    networks:
      - appnet

networks:
  appnet:
    driver: bridge

