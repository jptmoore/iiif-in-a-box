server {
    listen 80;
    
    # Security headers (appropriate for AWS ALB backend)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # Hide nginx version
    server_tokens off;
    
    # Real IP from AWS Load Balancer
    real_ip_header X-Forwarded-For;
    set_real_ip_from 10.0.0.0/8;    # AWS VPC range
    set_real_ip_from 172.16.0.0/12; # AWS VPC range
    set_real_ip_from 192.168.0.0/16; # AWS VPC range

    # Route specific services to their containers
    location /annosearch/ {
        # Only allow GET and HEAD methods for search
        limit_except GET HEAD {
            deny all;
        }
        proxy_pass http://annosearch:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /miiify/ {
        # Only allow GET and HEAD methods for annotation server
        limit_except GET HEAD {
            deny all;
        }
        proxy_pass http://miiify:10000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Route anything with /cantaloupe to the Cantaloupe image server
    location /cantaloupe/ {
        # Only allow GET and HEAD methods for image API
        limit_except GET HEAD {
            deny all;
        }
        proxy_pass http://cantaloupe:8182/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Health check endpoint for ALB
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Route everything else to the web service (Apache with Tamerlane)
    location / {
        # Only allow GET and HEAD methods for main web content
        limit_except GET HEAD {
            deny all;
        }
        proxy_pass http://web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
