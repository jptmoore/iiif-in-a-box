<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service Maintenance</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 60px 40px;
            text-align: center;
        }
        
        h1 {
            color: #333;
            font-size: 2.5em;
            margin-bottom: 20px;
            font-weight: 700;
        }
        
        .subtitle {
            color: #666;
            font-size: 1.3em;
            margin-bottom: 30px;
            font-weight: 400;
        }
        
        .message {
            color: #555;
            font-size: 1.1em;
            line-height: 1.8;
            margin-bottom: 40px;
        }
        
        .details {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-top: 30px;
        }
        
        .details p {
            color: #666;
            font-size: 0.95em;
            margin: 10px 0;
        }
        
        @media (max-width: 600px) {
            .container {
                padding: 40px 20px;
            }
            
            h1 {
                font-size: 2em;
            }
            
            .subtitle {
                font-size: 1.1em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Under Maintenance</h1>
        <p class="subtitle">We're making things better</p>
        
        <p class="message">
            Our IIIF service is currently undergoing scheduled maintenance 
            to improve performance and reliability. We'll be back online shortly.
        </p>
        
        <div class="details">
            <p><strong>What's happening?</strong></p>
            <p>We're performing system updates and improvements.</p>
            <p>Please check back in a few minutes.</p>
        </div>
    </div>
</body>
</html>
